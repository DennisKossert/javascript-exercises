<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function add7(number) {
            return number + 7
        }

        function multiply(n1, n2) {
            return n1 * n2
        }

        function capitalize(string) {
            return string.charAt(0).toUpperCase() + string.slice(1).toLowerCase()
        }

        function lastletter(string) {
            return string.slice(-1)
        }

        let numberone = Number(prompt("Enter number 1"));
        let numbertwo = Number(prompt("Enter number 2"));
        let word = prompt("Now give me a word or sentence.");

        document.body.innerHTML += (`${numberone} + 7 is ${add7(numberone)}. But multiplied with ${numbertwo} it becomes ${multiply(numberone, numbertwo)}. ${word} became ${capitalize(word)}. Last letter is ${lastletter(word)}.`)
        console.log("Hi!")
    </script>
</body>
</html>
